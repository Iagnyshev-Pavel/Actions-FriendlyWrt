name: Build FriendlyWrt + AWG for NanoPi R2S Plus

on:
  workflow_dispatch:
    inputs:
      ssh:
        description: 'Enable SSH debug session'
        required: false
        default: 'false'

env:
  OPENWRT_BRANCH: master-v24.10
  TARGET: rockchip
  SUBTARGET: armv8
  DEVICE: NanoPi-R2S-Plus

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 480

    steps:
      # ── Free disk space ───────────────────────────────────────────────────────
      - name: Free disk space
        run: |
          sudo rm -rf \
            /usr/share/dotnet \
            /usr/local/lib/android \
            /opt/ghc \
            /usr/local/share/boost \
            "$AGENT_TOOLSDIRECTORY"
          sudo docker image prune --all --force
          sudo apt-get autoremove -y
          sudo apt-get autoclean
          df -h

      # ── Checkout your fork of Actions-FriendlyWrt ────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Install build dependencies ────────────────────────────────────────────
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git \
            libncurses5-dev libssl-dev python3-setuptools \
            rsync unzip zlib1g-dev file wget curl \
            python3-pyelftools python3-dev \
            swig libpython3-dev \
            device-tree-compiler \
            antlr3 gperf \
            qemu-utils mkisofs

      # ── Clone FriendlyWrt source─────────────────────
      - name: Clone FriendlyWrt
        run: |
          git clone --depth 1 \
            -b ${{ env.OPENWRT_BRANCH }} \
            https://github.com/friendlyarm/friendlywrt \
            openwrt
          cd openwrt
          echo "Kernel version in tree:"
          cat include/kernel-version.mk | grep LINUX_VERSION | head -5

      # ── Add awg-openwrt feed ──────────────────────────────────────────────────
      - name: Add awg-openwrt feed
        run: |
          cd openwrt
          echo "src-git awg https://github.com/Slava-Shchipunov/awg-openwrt.git" \
            >> feeds.conf.default
          cat feeds.conf.default

      # ── Update & install all feeds ────────────────────────────────────────────
      - name: Update feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          ./scripts/feeds install -a -p awg

      # ── Write .config ─────────────────────────────────────────────────────────
      - name: Configure for R2S Plus + AWG
        run: |
          cd openwrt
          cat > .config <<'EOF'
          # Target
          CONFIG_TARGET_rockchip=y
          CONFIG_TARGET_rockchip_armv8=y
          CONFIG_TARGET_MULTI_PROFILE=y
          CONFIG_TARGET_PER_DEVICE_ROOTFS=y
          CONFIG_TARGET_rockchip_armv8_DEVICE_friendlyarm_nanopi-r2s-plus=y

          # Kernel crypto fix (build as module, not built-in)
          CONFIG_KERNEL_CRYPTO_CHACHA20_NEON=m

          # AWG packages
          CONFIG_PACKAGE_kmod-amneziawg=m
          CONFIG_PACKAGE_amneziawg-tools=y
          CONFIG_PACKAGE_luci-proto-amneziawg=y

          # Standard useful packages
          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_luci-ssl=y
          CONFIG_PACKAGE_luci-app-firewall=y
          CONFIG_PACKAGE_luci-app-opkg=y
          CONFIG_PACKAGE_htop=y
          CONFIG_PACKAGE_nano=y
          EOF

          make defconfig

          # Show final AWG config to confirm
          grep -i amnezia .config || echo "WARNING: amneziawg not found in .config"
          grep "LINUX_VERSION\|KERNEL_CRYPTO_CHACHA" .config | head -10

      # ── Cache toolchain ───────────────────────────────────────────────────────
      - name: Cache toolchain
        id: cache-toolchain
        uses: actions/cache@v4
        with:
          path: |
            openwrt/staging_dir/toolchain-*
            openwrt/staging_dir/host
          key: toolchain-friendlywrt-${{ env.OPENWRT_BRANCH }}-${{ env.TARGET }}-${{ env.SUBTARGET }}-v1

      # ── Build tools ───────────────────────────────────────────────────────────
      - name: Build tools
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: |
          cd openwrt
          make tools/install -j$(nproc) V=s 2>&1 | \
            grep -E "^(make|ERROR|WARNING|time:)" | tail -30

      # ── Build toolchain ───────────────────────────────────────────────────────
      - name: Build toolchain
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: |
          cd openwrt
          make toolchain/install -j$(nproc) V=s 2>&1 | \
            grep -E "^(make|ERROR|WARNING|time:)" | tail -30

      # ── Build kernel ──────────────────────────────────────────────────────────
      - name: Build kernel
        run: |
          cd openwrt
          make target/linux/compile -j$(nproc) V=s 2>&1 | \
            grep -E "^(make|ERROR|WARNING|time:)" | tail -50

      # ── Build all packages (including AWG) ────────────────────────────────────
      - name: Build packages
        run: |
          cd openwrt
          make package/compile -j$(nproc) V=s 2>&1 | \
            grep -E "^(make|ERROR|WARNING|time:)" | tail -50
          make package/index V=s

      # ── Build firmware image ──────────────────────────────────────────────────
      - name: Build firmware image
        run: |
          cd openwrt
          make target/install -j$(nproc) V=s 2>&1 | \
            grep -E "^(make|ERROR|WARNING|time:)" | tail -30

      # ── Collect outputs ───────────────────────────────────────────────────────
      - name: Collect firmware + IPKs
        run: |
          mkdir -p output/firmware
          mkdir -p output/ipks

          # Firmware images
          find openwrt/bin/targets -type f \( \
            -name "*.img.gz" \
            -o -name "*.img" \
            -o -name "*.ext4" \
            -o -name "*.manifest" \
            -o -name "*.buildinfo" \
          \) | while read f; do
            cp "$f" output/firmware/
            echo "Firmware: $f"
          done

          # AWG IPKs
          find openwrt/bin -name "*amneziawg*.ipk" | while read f; do
            cp "$f" output/ipks/
            echo "IPK: $f"
          done

          echo ""
          echo "=== Firmware files ==="
          ls -lh output/firmware/

          echo ""
          echo "=== AWG IPKs ==="
          ls -lh output/ipks/

          # Verify kernel version in the kmod filename
          echo ""
          echo "=== Kernel version check ==="
          ls output/ipks/kmod-amneziawg*.ipk 2>/dev/null \
            && echo "kmod filename looks good" \
            || echo "WARNING: kmod ipk not found"

      # ── Upload firmware ───────────────────────────────────────────────────────
      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: FriendlyWrt-AWG-R2S-Plus
          path: output/firmware/
          retention-days: 30

      # ── Upload IPKs separately ────────────────────────────────────────────────
      - name: Upload AWG IPKs
        uses: actions/upload-artifact@v4
        with:
          name: AWG-IPKs-rockchip-armv8-kernel
          path: output/ipks/
          retention-days: 30

      # ── Optional SSH debug session ────────────────────────────────────────────
      - name: SSH debug session
        if: ${{ github.event.inputs.ssh == 'true' || failure() }}
        uses: mxschmitt/action-tmate@v3
        timeout-minutes: 30
