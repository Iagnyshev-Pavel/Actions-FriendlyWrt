name: Build AmneziaWG for FriendlyWrt rk3328

on:
  watch:
    types: started
  workflow_dispatch:

jobs:
  build_friendlywrt:
    runs-on: ubuntu-22.04
    if: github.event.repository.owner.id == github.event.sender.id

    strategy:
      matrix:
        VERSION: ['24.10']
        SET: [non-docker]

    steps:
    - name: Checkout
      uses: actions/checkout@main

    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /etc/apt/sources.list.d
        wget https://raw.githubusercontent.com/friendlyarm/build-env-on-ubuntu-bionic/master/install.sh
        sed -i -e 's/^apt-get -y install openjdk-8-jdk/# apt-get -y install openjdk-8-jdk/g' install.sh
        sed -i -e 's/^\[ -d fa-toolchain \]/# [ -d fa-toolchain ]/g' install.sh
        sed -i -e 's/^(cat fa-toolchain/# (cat fa-toolchain/g' install.sh
        sed -i -e 's/^(tar xf fa-toolchain/# (tar xf fa-toolchain/g' install.sh
        sudo -E bash ./install.sh
        sudo -E git config --global user.name 'GitHub Actions'
        sudo -E git config --global user.email 'noreply@github.com'
        git clone https://github.com/friendlyarm/repo
        sudo -E cp repo/repo /usr/bin/
        mkdir -p ./artifact
        sudo swapoff -a
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android/sdk /usr/local/share/boost /opt/ghc
        echo "cores: $(nproc)"

    - name: Download source
      run: |
        mkdir project
        cd project
        # rk3328 manifest (NanoPi R2S Plus uses rk3328, NOT rk3399)
        repo init --depth=1 -u https://github.com/friendlyarm/friendlywrt_manifests -b master-v${{ matrix.VERSION }} \
                -m rk3328.xml --repo-url=https://github.com/friendlyarm/repo  --no-clone-bundle

        repo sync -c friendlywrt --no-clone-bundle
        repo sync -c configs --no-clone-bundle
        repo sync -c device/common --no-clone-bundle
        repo sync -c device/friendlyelec --no-clone-bundle
        repo sync -c scripts --no-clone-bundle
        repo sync -c scripts/sd-fuse  --no-clone-bundle
        repo sync -c toolchain  --no-clone-bundle

    - name: Apply customizations
      run: |
        cd project
        source ../scripts/add_packages.sh
        source ../scripts/custome_config.sh

    - name: Prepare dot config and feeds
      run: |
        cd project
        # ---- ADD AMNEZIAWG FEED ----
        cd friendlywrt
        echo 'src-git awgopenwrt https://github.com/Slava-Shchipunov/awg-openwrt.git' >> feeds.conf.default
        ./scripts/feeds update awgopenwrt
        ./scripts/feeds install -a -p awgopenwrt
        # ---- SELECT AWG PACKAGES ----
        echo "CONFIG_PACKAGE_kmod-amneziawg=m" >> .config
        echo "CONFIG_PACKAGE_amneziawg-tools=m" >> .config
        echo "CONFIG_PACKAGE_luci-app-amneziawg=m" >> .config
        echo "CONFIG_PACKAGE_luci-proto-amneziawg=m" >> .config
        cd ..
        # ----------------------------
        DIRNAME=friendlywrt$(echo ${{ matrix.VERSION }}|awk -F . '{print $1}')
        CONFIG=rk3328
        cat > .current_config.mk <<EOL
        . device/friendlyelec/rk3328/base.mk
        TARGET_IMAGE_DIRNAME=${DIRNAME}
        TARGET_FRIENDLYWRT_CONFIG=${CONFIG}
        EOL
        DEBUG_DOT_CONFIG=1 ./build.sh friendlywrt

    - name: Download package
      run: |
        cd project/friendlywrt
        make download -j8
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: Compile FriendlyWrt
      id: compile
      continue-on-error: true
      run: |
        cd project/friendlywrt
        make -j$(nproc) || make -j1 V=s
        echo $?

    - name: Check the result and try again
      if: steps.compile.outcome == 'failure'
      run: |
        cd project/friendlywrt
        make -j1 V=s

    - name: Collect AWG packages
      run: |
        mkdir -p ./artifact/awg-packages
        find project/friendlywrt/bin -name "*amneziawg*" -o -name "*awg*" | \
          xargs -I{} cp {} ./artifact/awg-packages/ 2>/dev/null || true
        ls -la ./artifact/awg-packages/

    - name: Upload AWG packages as artifact
      uses: actions/upload-artifact@v4
      with:
        name: amneziawg-rk3328-${{ matrix.VERSION }}
        path: ./artifact/awg-packages/
        if-no-files-found: warn
